services:
  - type: web
    name: hospital-bulk-processor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HOSPITAL_API_BASE_URL
        value: https://hospital-directory.onrender.com
      - key: PYTHON_VERSION
        value: 3.12.3
